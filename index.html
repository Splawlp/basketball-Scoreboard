<html>
    <head>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <div class="container">
            <div>
                <h3>HOME</h3>
                <p id="scored-home" class="points-place">0</p>
                <button onclick="scored1Home()">+1</button>
                <button onclick="scored2Home()">+2</button>
                <button onclick="scored3Home()">+3</button>
            </div>
            <div>
                <h3>GUEST</h3>
                <p id="scored-guest" class="points-place">0</p>
                <button onclick="scored1Guest()">+1</button>
                <button onclick="scored2Guest()">+2</button>
                <button onclick="scored3Guest()">+3</button>
            </div>
        </div>
        
        <button id="new-game" onclick="startNewGame()"> Start New Game</button>
        <script src="main.js"></script>
    </body>
</html>
